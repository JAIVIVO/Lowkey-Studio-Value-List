<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSX OG - Huge & Titanic Value List</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Mutation Colors */
            --gold: #eab308;
            --diamond: #38bdf8;
            --rainbow: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 0 20px 20px 20px;
        }

        /* --- PASEK NAWIGACJI PODOBNY DO TWÓJ_WZRÓR --- */
        .top-navbar {
            background: #111827;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1f2937;
            margin-bottom: 30px;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }

        .nav-item {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
            user-select: none;
        }

        .nav-item:hover {
            color: white;
        }

        .nav-item.active {
            color: #60a5fa;
            border-color: #3b82f6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .values-section {
            display: block;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 2;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
        }

        .filter-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Przycisk HOT ze specjalnym stylem ognia */
        #filter-hot:hover, #filter-hot.active {
            background: #f97316;
            color: white;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .items-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pet-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .pet-card:hover {
            transform: translateY(-5px);
        }

        .corner-fire {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1.8rem;
            z-index: 10;
            filter: drop-shadow(0 0 8px #f97316);
            animation: fire-burn 0.4s infinite alternate ease-in-out;
            cursor: default;
            user-select: none;
        }

        @keyframes fire-burn {
            0% { transform: scale(1) rotate(-2deg); filter: drop-shadow(0 0 6px #ef4444); }
            100% { transform: scale(1.15) rotate(3deg) translateY(-2px); filter: drop-shadow(0 0 12px #f97316); }
        }

        .pet-image-container {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .pet-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pet-image-placeholder {
            font-size: 3rem;
            color: #334155;
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .pet-name {
