        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 0 20px 20px 20px;
        }

        /* --- PASEK NAWIGACJI PODOBNY DO TWÓJ_WZRÓR --- */
        .top-navbar {
            background: #111827;
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 15px 0;
            border-bottom: 2px solid #1f2937;
            margin-bottom: 30px;
            width: 100vw;
            position: relative;
            left: 50%;
            right: 50%;
            margin-left: -50vw;
            margin-right: -50vw;
        }

        .nav-item {
            color: var(--text-muted);
            font-size: 1.2rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            padding-bottom: 5px;
            border-bottom: 3px solid transparent;
            user-select: none;
        }

        .nav-item:hover {
            color: white;
        }

        .nav-item.active {
            color: #60a5fa;
            border-color: #3b82f6;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .values-section {
            display: block;
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 2;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
        }

        .filter-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        /* Przycisk HOT ze specjalnym stylem ognia */
        #filter-hot:hover, #filter-hot.active {
            background: #f97316;
            color: white;
            box-shadow: 0 0 10px rgba(249, 115, 22, 0.5);
        }

        .items-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pet-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .pet-card:hover {
            transform: translateY(-5px);
        }

        .corner-fire {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1.8rem;
            z-index: 10;
            filter: drop-shadow(0 0 8px #f97316);
            animation: fire-burn 0.4s infinite alternate ease-in-out;
            cursor: default;
            user-select: none;
        }

        @keyframes fire-burn {
            0% { transform: scale(1) rotate(-2deg);
            filter: drop-shadow(0 0 6px #ef4444); }
            100% { transform: scale(1.15) rotate(3deg) translateY(-2px);
            filter: drop-shadow(0 0 12px #f97316); }
        }

        .pet-image-container {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .pet-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pet-image-placeholder {
            font-size: 3rem;
            color: #334155;
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .pet-name {
            font-size: 1.3rem;
            font-weight: bold;
            padding-right: 25px;
        }

        .pet-category {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .cat-titanic { background: #ec4899;
        color: white; }
        .cat-huge { background: #a855f7; color: white;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .stat-label { color: var(--text-muted);
        }
        .stat-value { font-weight: 600;
        }
        .value-gems { color: #f59e0b; font-weight: bold;
        }

        .mutations-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mutation-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
        }

        /* --- STYLIZACJA ANIMOWANYCH I MIENIĄCYCH SIĘ NAPISÓW --- */
        .m-gold, .m-diamond, .m-rainbow {
            font-weight: bold;
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        /* Złote mienienie */
        .m-gold {
            background-image: linear-gradient(90deg, #eab308 0%, #fef08a 25%, #eab308 50%, #fef08a 75%, #eab308 100%);
            animation: text-shine 3s linear infinite;
            filter: drop-shadow(0 0 2px rgba(234, 179, 8, 0.3));
        }

        /* Diamentowe mienienie */
        .m-diamond {
            background-image: linear-gradient(90deg, #38bdf8 0%, #e0f2fe 25%, #38bdf8 50%, #e0f2fe 75%, #38bdf8 100%);
            animation: text-shine 3s linear infinite;
            filter: drop-shadow(0 0 2px rgba(56, 189, 248, 0.3));
        }

        /* Tęczowe mienienie (Rainbow) */
        .m-rainbow {
            background-image: linear-gradient(90deg, #ff0055, #00ffcc, #9900ff, #ffcc00, #ff0055);
            animation: text-shine 2s linear infinite;
            filter: drop-shadow(0 0 3px rgba(236, 72, 153, 0.4));
        }

        @keyframes text-shine {
            to { background-position: 200% center;
            }
        }

        /* PODSTRONA HELP */

            max-width: 800px;
            margin: 40px auto;
            background: var(--card-bg);
            border: 2px dashed #4b5563;
            border-radius: 16px;
            padding: 50px 30px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);

            font-size: 2.2rem;

            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .help-text {
            font-size: 1.3rem;
            line-height: 1.7;
            color: #f3f4f6;
            margin-bottom: 40px;
            font-weight: 500;
        }

            color: #38bdf8;

            border-radius: 6px;
            font-family: monospace;
            font-weight: bold;

        }

            background: #4752C4;
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }
    </style>

        let currentCategory = 'all';
        function displayItems(items) {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'pet-card';
                
                const fireHTML = item.isHot ? `<div class="corner-fire">🔥</div>` : '';
                const imageHTML = item.img 
                    ? `<img src="images/${item.img}" alt="${item.name}" class="pet-image">`
                    : `<div class="pet-image-placeholder">🐾</div>`;

                card.innerHTML = `
                    ${fireHTML}
              
                    <div class="pet-image-container">
                        ${imageHTML}
                    </div>
                    <div class="pet-header">
                        <span class="pet-name">${item.name}</span>
   
                        <span class="pet-category ${item.tagClass}">${item.category}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Normal Value:</span>
          
                        <span class="stat-value value-gems">${item.value}</span>
                    </div>
                    
                    <div class="mutations-title">Mutations:</div>
                    
   
                    <div class="mutation-row">
                        <span class="m-gold">💛 Gold:</span>
                        <span class="stat-value">${item.gold}</span>
                    </div>
           
                    <div class="mutation-row">
                        <span class="m-diamond">💎 Diamond:</span>
                        <span class="stat-value">${item.diamond}</span>
                    </div>
                   
                    <div class="mutation-row">
                        <span class="m-rainbow">🌈 Rainbow:</span>
                        <span class="stat-value">${item.rainbow}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchTab(tabName) {
            const navValues = document.getElementById('nav-values');
            const navHelp = document.getElementById('nav-help');
            const contentValues = document.getElementById('tab-values-content');
            const contentHelp = document.getElementById('tab-help-content');
            if (tabName === 'values') {
                navValues.classList.add('active');
                navHelp.classList.remove('active');
                contentValues.style.display = 'block';
                contentHelp.style.display = 'none';
                filterCategory(currentCategory);
            } else if (tabName === 'help') {
                navHelp.classList.add('active');
                navValues.classList.remove('active');
                contentValues.style.display = 'none';
                contentHelp.style.display = 'block';
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const searchWord = e.target.value.toLowerCase();
            const filtered = database.filter(item => {
                const matchesSearch = item.name.toLowerCase().includes(searchWord);
                
       
                let matchesCategory = false;
                if (currentCategory === 'all') {
                    matchesCategory = true;
                } else if (currentCategory === 'HOT') {
                    matchesCategory = item.isHot === true;
                } else {
                    matchesCategory = item.category === currentCategory;
                }
                
                return matchesSearch && matchesCategory;
       
            });
            displayItems(filtered);
        });
        function filterCategory(category) {
            currentCategory = category;
            const buttons = document.querySelectorAll('.controls .filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            document.getElementById(`filter-${category.toLowerCase()}`).classList.add('active');
            document.getElementById('search').value = '';
            if (category === 'all') {
                displayItems(database);
            } else if (category === 'HOT') {
                const filtered = database.filter(item => item.isHot === true);
                displayItems(filtered);
            } else {
                const filtered = database.filter(item => item.category === category);
                displayItems(filtered);
            }
        }

        displayItems(database);
    </script>
