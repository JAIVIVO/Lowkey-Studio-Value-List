<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSX OG - Huge & Titanic Value List</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Mutation Colors */
            --gold: #eab308;
            --diamond: #38bdf8;
            --rainbow: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 2;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
        }

        .filter-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .items-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pet-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
            display: flex;
            flex-direction: column;
            position: relative; /* Wymagane, żeby płomień trzymał się rogu karty */
        }

        .pet-card:hover {
            transform: translateY(-5px);
        }

        /* STYL ANIMOWANEGO OGNIWA W ROGU KARTY */
        .corner-fire {
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 1.8rem;
            z-index: 10;
            filter: drop-shadow(0 0 8px #f97316);
            animation: fire-burn 0.4s infinite alternate ease-in-out;
            cursor: default;
            user-select: none;
        }

        @keyframes fire-burn {
            0% {
                transform: scale(1) rotate(-2deg);
                filter: drop-shadow(0 0 6px #ef4444);
            }
            100% {
                transform: scale(1.15) rotate(3deg) translateY(-2px);
                filter: drop-shadow(0 0 12px #f97316);
            }
        }

        .pet-image-container {
            width: 100%;
            height: 150px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 1px solid #334155;
        }

        .pet-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .pet-image-placeholder {
            font-size: 3rem;
            color: #334155;
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .pet-name {
            font-size: 1.3rem;
            font-weight: bold;
            padding-right: 25px; /* Zapobiega nakładaniu się długich nazw na płomień */
        }

        .pet-category {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .cat-titanic { background: #ec4899; color: white; }
        .cat-huge { background: #a855f7; color: white; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

            color: var(--text-muted
