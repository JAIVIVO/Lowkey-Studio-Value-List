<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSX OG - Huge & Titanic Value List</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent-blue: #3b82f6;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            
            /* Kolory mutacji */
            --gold: #eab308;
            --diamond: #38bdf8;
            --rainbow: #ec4899;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.3);
            margin-bottom: 10px;
        }

        header p {
            color: var(--text-muted);
        }

        .controls {
            max-width: 1200px;
            margin: 0 auto 30px auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .search-bar {
            flex: 2;
            min-width: 250px;
            padding: 12px 20px;
            border-radius: 8px;
            border: 2px solid #334155;
            background: var(--card-bg);
            color: white;
            font-size: 1rem;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-blue);
        }

        .filter-btn {
            padding: 12px 20px;
            border-radius: 8px;
            border: none;
            background: var(--card-bg);
            color: var(--text-muted);
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
        }

        .filter-btn:hover, .filter-btn.active {
            background: var(--accent-blue);
            color: white;
        }

        .items-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .pet-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .pet-card:hover {
            transform: translateY(-5px);
        }

        .pet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 2px solid #334155;
            padding-bottom: 10px;
        }

        .pet-name {
            font-size: 1.3rem;
            font-weight: bold;
        }

        .pet-category {
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
            padding: 4px 10px;
            border-radius: 6px;
        }

        .cat-huge { background: #a855f7; color: white; }
        .cat-titanic { background: #ec4899; color: white; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #334155;
        }

        .stat-label {
            color: var(--text-muted);
        }

        .stat-value {
            font-weight: 600;
        }

        .value-gems {
            color: #f59e0b;
            font-weight: bold;
        }

        /* Sekcja Mutacji */
        .mutations-title {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 15px;
            margin-bottom: 5px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .mutation-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 0.95rem;
        }

        .m-gold { color: var(--gold); }
        .m-diamond { color: var(--diamond); }
        .m-rainbow { color: var(--rainbow); }
    </style>
</head>
<body>

    <header>
        <h1>PSX OG Value List</h1>
        <p>Wartości petów giełdy Pet Simulator X OG — Huge & Titanic</p>
    </header>

    <div class="controls">
        <input type="text" id="search" class="search-bar" placeholder="Wyszukaj peta...">
        <button class="filter-btn active" onclick="filterCategory('all')">Wszystkie</button>
        <button class="filter-btn" onclick="filterCategory('Huge')">Huge</button>
        <button class="filter-btn" onclick="filterCategory('Titanic')">Titanic</button>
    </div>

    <main class="items-grid" id="itemsContainer">
        </main>

    <script>
        // --- BAZA DANYCH PETÓW (TUTAJ WPISUJESZ I EDYTUJESZ CENY) ---
        const database = [
            {
                name: "Huge Cat",
                category: "Huge",
                tagClass: "cat-huge",
                value: "4.5T Gems",
                gold: "12T Gems",
                diamond: "18T Gems",
                rainbow: "35T Gems"
            },
            {
                name: "Huge Hell Rock",
                category: "Huge",
                tagClass: "cat-huge",
                value: "60B Gems",
                gold: "180B Gems",
                diamond: "290B Gems",
                rainbow: "550B Gems"
            },
            {
                name: "Titanic Hippomelon",
                category: "Titanic",
                tagClass: "cat-titanic",
                value: "25T Gems",
                gold: "70T Gems",
                diamond: "110T Gems",
                rainbow: "200T Gems"
            },
            {
                name: "Titanic Hubert",
                category: "Titanic",
                tagClass: "cat-titanic",
                value: "40T Gems",
                gold: "120T Gems",
                diamond: "190T Gems",
                rainbow: "380T Gems"
            }
        ];

        function displayItems(items) {
            const container = document.getElementById('itemsContainer');
            container.innerHTML = '';

            items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'pet-card';
                card.innerHTML = `
                    <div class="pet-header">
                        <span class="pet-name">${item.name}</span>
                        <span class="pet-category ${item.tagClass}">${item.category}</span>
                    </div>
                    <div class="stat-row">
                        <span class="stat-label">Zwykły (Normal):</span>
                        <span class="stat-value value-gems">${item.value}</span>
                    </div>
                    
                    <div class="mutations-title">Mutacje (Wartość):</div>
                    
                    <div class="mutation-row">
                        <span class="m-gold">💛 Gold:</span>
                        <span class="stat-value">${item.gold}</span>
                    </div>
                    <div class="mutation-row">
                        <span class="m-diamond">💎 Diamond:</span>
                        <span class="stat-value">${item.diamond}</span>
                    </div>
                    <div class="mutation-row">
                        <span class="m-rainbow">🌈 Rainbow:</span>
                        <span class="stat-value">${item.rainbow}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Szukajka
        document.getElementById('search').addEventListener('input', (e) => {
            const searchWord = e.target.value.toLowerCase();
            const filtered = database.filter(item => 
                item.name.toLowerCase().includes(searchWord)
            );
            displayItems(filtered);
        });

        // Filtry kategorii
        function filterCategory(category) {
            const buttons = document.querySelectorAll('.filter-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            
            if(event && event.target) {
                event.target.classList.add('active');
            }

            if(category === 'all') {
                displayItems(database);
            } else {
                const filtered = database.filter(item => item.category === category);
                displayItems(filtered);
            }
        }

        // Start strony
        displayItems(database);
    </script>
</body>
</html>
